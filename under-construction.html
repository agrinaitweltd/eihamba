<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eihamba Coffee | Under Construction</title>
  <style>
    :root {
      --gold: #c4a265;
      --gold-light: #d4b87a;
      --brown-dark: #3d2b1f;
      --brown-medium: #5c4033;
      --cream: #f9f6f1;
      --cream-dark: #f0ebe3;
      --text-dark: #2d2a26;
      --text-medium: #62574d;
      --white: #ffffff;
      --shadow: 0 24px 60px rgba(61, 43, 31, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      position: relative;
      overflow: hidden;
      margin: 0;
      min-height: 100vh;
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #fff;
      background: url("./public/hero-bg.png") center center / cover no-repeat;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(7, 20, 18, 0.35) 0%, rgba(4, 14, 13, 0.62) 45%, rgba(0, 0, 0, 0.7) 100%),
        radial-gradient(circle at center, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0.46));
    }

    .top-bar,
    .hero-copy {
      position: relative;
      z-index: 1;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand-logo {
      width: 94px;
      height: auto;
      filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.35));
    }

    .status-chip {
      border: 1px solid rgba(255, 255, 255, 0.32);
      background: rgba(255, 255, 255, 0.1);
      color: #f9f6f1;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1rem;
      text-transform: uppercase;
      backdrop-filter: blur(6px);
    }

    .hero-copy {
      width: min(920px, 100%);
      margin: auto;
      text-align: center;
      padding: 20px 0;
    }

    .kicker {
      margin: 0 0 12px;
      color: #f6ecdc;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.24rem;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: #ffffff;
      font-family: "Arial Black", "Segoe UI", sans-serif;
      font-size: clamp(2.5rem, 9vw, 7rem);
      line-height: 0.88;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      text-shadow: 0 12px 24px rgba(0, 0, 0, 0.45);
    }

    h2 {
      margin: 20px 0 8px;
      color: #f4eee4;
      font-size: clamp(1.1rem, 2.7vw, 1.8rem);
      font-weight: 600;
    }

    .message {
      margin: 0 auto;
      max-width: 42ch;
      color: rgba(255, 255, 255, 0.9);
      font-size: 1rem;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      body {
        padding: 20px 18px;
        background-attachment: fixed;
      }

      .top-bar {
        margin-bottom: 32px;
        gap: 12px;
      }

      .brand-logo {
        width: 80px;
      }

      .status-chip {
        padding: 10px 14px;
        font-size: 0.72rem;
        letter-spacing: 0.08rem;
      }

      .hero-copy {
        margin-top: auto;
        margin-bottom: auto;
        padding: 24px 0;
      }

      .kicker {
        margin-bottom: 14px;
        font-size: 0.82rem;
        letter-spacing: 0.2rem;
      }

      h1 {
        font-size: clamp(2.2rem, 8vw, 4.2rem);
        line-height: 0.92;
        margin-bottom: 6px;
      }

      h2 {
        font-size: clamp(1rem, 2.3vw, 1.5rem);
        margin: 16px 0 6px;
      }

      .message {
        font-size: 0.95rem;
        line-height: 1.5;
        margin-top: 10px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 16px 14px;
      }

      .top-bar {
        margin-bottom: 28px;
        gap: 10px;
      }

      .brand-logo {
        width: 72px;
      }

      .status-chip {
        padding: 8px 12px;
        font-size: 0.68rem;
        letter-spacing: 0.07rem;
      }

      .hero-copy {
        padding: 20px 0;
      }

      .kicker {
        margin-bottom: 10px;
        font-size: 0.76rem;
        letter-spacing: 0.16rem;
      }

      h1 {
        font-size: clamp(1.8rem, 7vw, 3.2rem);
        line-height: 0.98;
        margin-bottom: 4px;
        letter-spacing: 0.02em;
      }

      h2 {
        font-size: clamp(0.95rem, 2vw, 1.2rem);
        margin: 12px 0 4px;
        font-weight: 600;
      }

      .message {
        font-size: 0.9rem;
        line-height: 1.4;
        max-width: 36ch;
        margin-top: 8px;
      }
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <img class="brand-logo" src="./public/logo.png" alt="Eihamba Coffee logo">
    <span class="status-chip">Maintenance</span>
  </header>

  <main class="hero-copy">
    <p class="kicker">Eihamba Coffee</p>
    <h1>WEBSITE<br>UNDER CONSTRUCTION</h1>
    <h2>We are making improvements!</h2>
    <p class="message">Please check back soon for an even better experience.</p>
  </main>
</body>
</html>
